apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: alloy-egress-allow
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alloy
  egress:
    # 1. Allow DNS Resolution (so it can find Loki/Tempo/Prometheus)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY

    # 2. Allow Kube API Access (so Beyla can tag traces with pod names)
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP

    # 3. Allow internal traffic to the rest of the monitoring stack
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
