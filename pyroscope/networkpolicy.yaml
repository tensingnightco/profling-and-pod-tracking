apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-to-tempo
  namespace: monitoring # Change this if Grafana is in a different namespace!
spec:
  # 1. Who is making the request? (Grafana)
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana # Verify this matches your Grafana pod's labels!
  policyTypes:
    - Egress
  egress:
    # 2. Who are they talking to? (Tempo)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: tempo
      # 3. On what port? (3200 HTTP)
      ports:
        - protocol: TCP
          port: 3200
