alloy:
  extraArgs:
    - --storage.path=/tmp/alloy
  resources:
    limits:
      memory: 900Mi
      cpu: 500m
    requests:
      memory: 150Mi
      cpu: 100m
  securityContext:
    privileged: true
    runAsUser: 0
    runAsGroup: 0
    capabilities:
      add: [ "CAP_DAC_READ_SEARCH", "CAP_SYS_PTRACE" ]
  stabilityLevel: "public-preview"
  mounts:
    varlog: true
    extra:
      - name: tetragon-logs
        mountPath: /var/run/cilium/tetragon
        readOnly: false
        mountPropagation: HostToContainer
      - name: debugfs
        mountPath: /sys/kernel/debug
        readOnly: false
      - name: tmp
        mountPath: /tmp # This makes /tmp writable
      - name: proc
        mountPath: /host/proc
        readOnly: true
      - name: bpf
        mountPath: /sys/fs/bpf
        readOnly: false
      # ADD THIS: Writable cache for the Java Agent
      - name: root-cache
        mountPath: /root/.cache
        readOnly: false
      # ADD THIS: Writable cache for Loki's position files
      - name: alloy-tmp
        mountPath: /tmp/alloy
        readOnly: false
  configMap:
    create: true
    name:
    content: |
      // 1. Discover the Pyroscope service
      discovery.kubernetes "pyroscope_service" {
        role = "service"
      }

      // 2. Filter to find only the Pyroscope service
      discovery.relabel "pyroscope_metrics" {
        targets = discovery.kubernetes.pyroscope_service.targets

        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          regex         = "pyroscope" 
          action        = "keep"
        }
      }

      // 3. Scrape the metrics and send them to Prometheus/Loki
      prometheus.scrape "pyroscope_internal" {
        targets    = discovery.relabel.pyroscope_metrics.output
        forward_to = [prometheus.remote_write.default.receiver]
      }

      // 4. Define where the metrics go (Assuming you have a Prometheus or Mimir endpoint)
      prometheus.remote_write "default" {
        endpoint {
          url = "http://prometheus:9090/api/v1/write" 
        }
      }

      // 1. Discovery k8s & relabelling 
      discovery.kubernetes "k8s_pods" {
        role = "pod"
      }

      discovery.relabel "filter_pods" {
        targets = discovery.kubernetes.k8s_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex = "kube-system|argocd|monitoring|elk|elk-dung"
          action = "drop"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "service_name"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      // 2. EBPF profiler configuration
      pyroscope.ebpf "profiler" {
        python_enabled = true
        targets = discovery.relabel.filter_pods.output
        sample_rate = 23
        forward_to = [pyroscope.write.profiling.receiver]
      }

      pyroscope.write "profiling" {
        endpoint {
          url = "http://pyroscope:4040"
          tls_config {
            insecure_skip_verify = true
          }
        }
      }

      // 1. Embedded Beyla (eBPF Auto-instrumentation)
      beyla.ebpf "auto_traces" {
        attributes {
          kubernetes { 
            enable = "true" // Ensures traces get tagged with pod/namespace names
          }
        }
        discovery {
          instrument {
            kubernetes {}
          }
        }
        output {
          // Send Beyla traces into the batch processor
          traces = [otelcol.processor.batch.default.input]
        }
      }

      // 2. Open the gates for external OTLP traces from your apps (Optional, but good practice)
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces  = [otelcol.processor.batch.default.input]
        }
      }

      // 3. Batch them up (keeps the network happy)
      otelcol.processor.batch "default" {
        output {
          traces  = [otelcol.exporter.otlp.tempo.input]
        }
      }

      // 4. Ship them to your new Tempo binary
      otelcol.exporter.otlp "tempo" {
        client {
          // Make sure this matches your Tempo service name!
          endpoint = "http://tempo:4317"
          tls {
            insecure             = true
            insecure_skip_verify = true
          }
        }
      }

      // 4. Security event logs from Tetragon and Loki configuration
      local.file_match "tetragon_logs" {
        path_targets = [{
          "__path__" = "/var/run/cilium/tetragon/tetragon.log",
          "job"          = "tetragon",
          "service_name" = "tetragon-pod-tracking",
        }]
      } 

      loki.source.file "tetragon_source" {
        targets = local.file_match.tetragon_logs.targets
        forward_to = [loki.process.tetragon_parsing.receiver]
      }

      loki.process "tetragon_parsing" {
        stage.drop {
          expression = "^[^{]"
        }

        stage.json {
          expressions = {
            event_type = "$.process_kprobe.function_name", 
            net_event  = "$.process_tracepoint.event",
            msg        = "$.message",
            exec_ns    = "$.process_exec.process.pod.namespace",
            exec_pod   = "$.process_exec.process.pod.name",
            exec_bin   = "$.process_exec.process.binary",
            file_path  = "$.process_kprobe.args[0].filename_arg",
            dest_ip    = "$.process_tracepoint.args[2].sockaddr_arg.ip",
            dest_port  = "$.process_tracepoint.args[1].int_arg",
            
            // FIX: Dig into the nested paths for the policy names
            kprobe_policy = "$.process_kprobe.policy_name",
            trace_policy  = "$.process_tracepoint.policy_name",
          }
        }

        // FIX: Merge the nested policy variables
        stage.template {
          source   = "active_policy"
          template = "{{ "{{" }} or .kprobe_policy .trace_policy \"\" }}"
        }

        // 1. Fixed Fallback Labels
        stage.template {
          source   = "ns"
          template = "{{ "{{" }} or .exec_ns \"system-kernel\" }}"
        }
        stage.template {
          source   = "p"
          template = "{{ "{{" }} or .exec_pod \"host-level\" }}"
        }
        stage.template {
          source   = "category"
          template = "{{ "{{" }} if .event_type }}file-io{{ "{{" }} else if .net_event }}network{{ "{{" }} else }}process{{ "{{" }} end }}"
        }

        stage.labels {
          values = {
            namespace = "ns",
            pod       = "p",
            event_cat = "category",
            tracing_policy = "active_policy", // FIX: Apply the merged variable to the label
          }
        }

        // 2. Fixed Unified Message Output
        stage.template {
          source = "human_msg"
          template = "[{{ "{{" }} .category | upper }}] {{ "{{" }} if eq .category \"file-io\" }}Action: {{ "{{" }} .event_type }} on {{ "{{" }} .file_path }}{{ "{{" }} else if eq .category \"network\" }}Connect to {{ "{{" }} .dest_ip }}:{{ "{{" }} .dest_port }}{{ "{{" }} else }}Process {{ "{{" }} .exec_bin }} spawned{{ "{{" }} end }} - Alert: {{ "{{" }} .msg | default \"None\" }}"
        }
        
        stage.output {
          source = "human_msg"
        }

        forward_to = [loki.write.loki_sink.receiver]
      }

      loki.write "loki_sink" {
        endpoint {
          url = "http://loki-gateway:80/loki/api/v1/push"
        }
      }

controller:
  hostPID: true
  volumes:
    extra:
      - name: tmp
        emptyDir: {} # This creates a writable scratch space in RAM/Disk
      - name: tetragon-logs
        hostPath:
          path: /var/run/cilium/tetragon
          type: DirectoryOrCreate
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
          type: Directory
      - name: proc
        hostPath:
          path: /proc
      - name: bpf
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
      - name: root-cache
        emptyDir: {}
      - name: alloy-tmp
        emptyDir: {}

configReloader:
  resources:
    requests:
      memory: 10Mi
      cpu: 50m

networkPolicy:
  enabled: false
  flavor: kubernetes

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - {}
  egress:
    - {}
