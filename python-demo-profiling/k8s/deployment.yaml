apiVersion: v1
kind: Namespace
metadata:
  name: python-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: python-demo-config
  namespace: trace-profile-demo
data:
  OTEL_SERVICE_NAME: "python-demo-app"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-demo-app
  namespace: trace-profile-demo
  labels:
    app: python-demo-app
    language: python
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-demo-app
  template:
    metadata:
      labels:
        app: python-demo-app
        language: python
      annotations:
        # Pyroscope auto-discovery
        pyroscope.io/scrape: "true"
        pyroscope.io/port: "8080"
        pyroscope.io/application-name: "python-demo-app"
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: app
        image: tensingnightco/python-demo-profiling:1.0.2
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: PORT
          value: "8080"
        - name: PYTHONNODEBUGINFO
          value: "1"
        - name: PYTHONFAULTHANDLER
          value: "1"
        - name: PYROSCOPE_SERVER_ADDRESS
          value: "http://pyroscope.monitoring.svc.cluster.local:4040"
        - name: OTEL_SERVICE_NAME
          value: "python-demo-app"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "400Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: python-demo-app
  namespace: trace-profile-demo
  labels:
    app: python-demo-app
spec:
  selector:
    app: python-demo-app
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP