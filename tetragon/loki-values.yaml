global:
  clusterDomain: "cluster.local"
  dnsService: "rke2-coredns-rke2-coredns"
  dnsNamespace: "kube-system"

deploymentMode: Monolithic

loki:
  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki
  auth_enabled: false
  storage:      
    bucketNames:
      chunks: "pod-tracking-chunks"
      ruler: "pod-tracking-ruler"
      admin: "pod-tracking-admin"
    type: s3
    s3:
      endpoint: s3.xorcloud.net
      secretAccessKey: EPSR7nAKICASKtdJvnVbfjBBwOFuzS5bPOBkTilH
      accessKeyId: CBV9EVOGVK7B2QQDTGRO
      s3ForcePathStyle: true
      insecure: true
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage_config:
    aws:
      bucketnames: "pod-tracking-chunks"
      s3forcepathstyle: true
  limits_config:
    retention_period: 168h
    reject_old_samples_max_age: 168h
    max_entries_limit_per_query: 5000
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    allow_structured_metadata: true
  pattern_ingester:
    enabled: true
  ruler:
    enable_api: true

singleBinary:
  replicas: 1
  resources:
    limits:
      memory: 1Gi
      cpu: 1000m
    requests:
      memory: 512Mi
      cpu: 200m
  initContainers:
    - name: fix-permissions
      image: busybox
      command: ["sh", "-c", "chown -R 10001:10001 /var/loki"]
      securityContext:
        runAsUser: 0
      volumeMounts:
        - name: storage
          mountPath: /var/loki
  podSecurityContext:
    fsGroup: 10001
    runAsGroup: 10001
    runAsUser: 10001
  persistence:
    enableStatefulSetAutoDeletePVC: true
    accessModes:
      - ReadWriteMany
    size: 10Gi
    storageClass: csi-cinder-sc-retain

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  allocatedMemory: 1024
  allocatedCPU: 500m

lokiCanary:
  livenessProbe:
    httpGet:
      path: /metrics
      port: http-metrics
    initialDelaySeconds: 15
    timeoutSeconds: 1

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0