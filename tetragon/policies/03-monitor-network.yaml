apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-network-connections
  labels:
    app: tetragon-policies
    policy-category: network
spec:
  tracepoints:
  - subsystem: "sock"
    event: "inet_sock_set_state"
    args:
    - index: 0
      type: "int"
    - index: 1
      type: "int"
    - index: 2
      type: "int"
    - index: 3
      type: "int"
    - index: 4
      type: "int"
    - index: 5
      type: "int"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "1"  # TCP protocol
      - index: 1
        operator: "Equal"
        values:
        - "7"  # TCP_ESTABLISHED
      matchActions:
      - action: Post
        rateLimit: "10s"

---
# Policy for DNS queries monitoring
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-dns-queries
  labels:
    app: tetragon-policies
    policy-category: network
spec:
  kprobes:
  - call: "sendmsg"
    syscall: true
    args:
    - index: 0
      type: "int"
    - index: 1
      type: "sockaddr"
    - index: 2
      type: "int"
    selectors:
    - matchArgs:
      - index: 1
        operator: "Equal"
        values:
        - "53"  # DNS port
      matchActions:
      - action: Post
        rateLimit: "5s"

---
# Policy for monitoring suspicious ports
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-suspicious-ports
  labels:
    app: tetragon-policies
    policy-category: network
spec:
  tracepoints:
  - subsystem: "sock"
    event: "inet_sock_set_state"
    args:
    - index: 0
      type: "int"
    - index: 1
      type: "int"
    - index: 2
      type: "int"
    - index: 3
      type: "int"
    - index: 4
      type: "int"
    - index: 5
      type: "int"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "1"  # TCP
      - index: 5
        operator: "Equal"
        values:
        - "4444"
        - "5555"
        - "6666"
        - "6667"
        - "31337"
        - "8888"
        - "9999"
      matchActions:
      - action: Post
        rateLimit: "30s"

---
# Policy for monitoring unexpected outbound traffic (simplified)
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-outbound-traffic
  labels:
    app: tetragon-policies
    policy-category: network
spec:
  tracepoints:
  - subsystem: "tcp"
    event: "tcp_connect"
    args:
    - index: 0
      type: "int"
    - index: 1
      type: "int"
    - index: 2
      type: "int"
    - index: 3
      type: "int"
    selectors:
    - matchActions:
      - action: Post
        rateLimit: "5s"