apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-sensitive-files
  labels:
    app: tetragon-policies
    policy-category: file-access
spec:
  kprobes:
  - call: "sys_write"
    syscall: true
    args:
    - index: 0
      type: "int"
    - index: 1
      type: "filename"  # Changed from char_ptr to filename
    - index: 2
      type: "size_t"
    selectors:
    - matchArgs:
      - index: 1
        operator: "Prefix"
        values:
        - "/etc/passwd"
        - "/etc/shadow"
        - "/etc/sudoers"
        - "/root/.ssh/authorized_keys"
        - "/app/config/production.yaml"
        - "/app/secrets/apikeys.json"
      matchActions:
      - action: Post
        rateLimit: "1m"
    message: "Sensitive file write detected"

---
# Policy for monitoring sensitive file reads
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-sensitive-file-reads
  labels:
    app: tetragon-policies
    policy-category: file-access
spec:
  kprobes:
  - call: "sys_open"
    syscall: true
    args:
    - index: 0
      type: "filename"  # Changed from char_ptr to filename
    - index: 1
      type: "int"
    - index: 2
      type: "int"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Prefix"
        values:
        - "/etc/passwd"
        - "/etc/shadow"
        - "/etc/ssh/ssh_config"
        - "/root/.ssh/id_rsa"
        - "/app/secrets/"
      matchActions:
      - action: Post
        rateLimit: "30s"
    message: "Sensitive file read detected"

---
# Policy for monitoring file deletions
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-file-deletions
  labels:
    app: tetragon-policies
    policy-category: file-access
spec:
  kprobes:
  - call: "sys_unlink"
    syscall: true
    args:
    - index: 0
      type: "filename"  # Changed from char_ptr to filename
    selectors:
    - matchArgs:
      - index: 0
        operator: "Prefix"
        values:
        - "/etc/"
        - "/root/.ssh/"
        - "/var/log/"
      matchActions:
      - action: Post
        rateLimit: "1m"
    message: "Sensitive file deletion detected"

---
# Policy for monitoring file permission changes (chmod)
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-file-permissions
  labels:
    app: tetragon-policies
    policy-category: file-access
spec:
  kprobes:
  - call: "sys_chmod"
    syscall: true
    args:
    - index: 0
      type: "filename"  # Changed from char_ptr to filename
    - index: 1
      type: "int"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Prefix"
        values:
        - "/etc/"
        - "/root/"
        - "/usr/bin/"
      matchActions:
      - action: Post
        rateLimit: "1m"
    message: "File permission change detected on sensitive location"