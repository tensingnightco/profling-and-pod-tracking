apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-privilege-escalation-attempts
  labels:
    app: tetragon-policies
    policy-category: privilege-escalation
spec:
  kprobes:
  - call: "sys_execve"
    syscall: true
    # The 'message' field is the correct way to add info to events
    message: "Detected privilege escalation attempt"
    args:
    - index: 0
      type: "string"
    - index: 1
      type: "string"
    - index: 2
      type: "string"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Prefix"
        values:
        - "/bin/sudo"
        - "/usr/bin/sudo"
        - "/bin/su"
        - "/usr/bin/su"
        - "/sbin/setcap"
        - "/usr/sbin/setcap"
      matchActions:
      - action: Sigkill
      - action: Post

---
# Policy for monitoring shell escape attempts
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-shell-escapes
  labels:
    app: tetragon-policies
    policy-category: privilege-escalation
spec:
  kprobes:
  - call: "sys_execve"
    syscall: true
    message: "Potential shell escape detected"
    args:
    - index: 0
      type: "string"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "/bin/vi"
        - "/usr/bin/vi"
        - "/usr/bin/vim"
        - "/bin/nano"
        - "/usr/bin/nano"
        - "/usr/bin/less"
        - "/usr/bin/more"
        - "/bin/ed"
        - "/bin/sed"
        - "/bin/awk"
        - "/usr/bin/perl"
        - "/usr/bin/python"
        - "/usr/bin/python3"
        - "/usr/bin/ruby"
        - "/usr/bin/node"
      matchActions:
      - action: Post
        rateLimit: "1m"

---
# Policy for monitoring capability changes
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-capability-changes
  labels:
    app: tetragon-policies
    policy-category: privilege-escalation
spec:
  kprobes:
  - call: "capset"
    syscall: true
    message: "Capability change detected"
    args:
    - index: 0
      type: "int"
    - index: 1
      type: "int"
    - index: 2
      type: "int"
    - index: 3
      type: "string"
    selectors:
    - matchActions:
      - action: Post
        rateLimit: "1m"